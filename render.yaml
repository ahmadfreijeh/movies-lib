databases:
  - name: book-library-db
    plan: free
    databaseName: book_library
    user: book_library

services:
  - type: web
    name: book-library-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: book-library-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5050
      - key: FRONTEND_URL
        fromService:
          type: web
          name: book-library-frontend
          property: host

  - type: web
    name: book-library-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: book-library-backend
          property: host
